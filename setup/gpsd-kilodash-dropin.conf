# kilodash drop-in for gpsd.service — installed by setup/install-gps.sh to
# /etc/systemd/system/gpsd.service.d/kilodash.conf
#
# Baud-config ordering (GPS-Integration Phase 1): the PA1616S must be
# probed and raised to 115200/10 Hz BEFORE gpsd opens the port, so gpsd
# always meets an already-configured module. pa1616s exits 0 when
# /dev/gps0 is absent (gpsd then just waits); any real configuration
# failure fails the unit loudly — the GPS tile shows the fault.

[Service]
Environment=PYTHONPATH=/opt/kilodash
ExecStartPre=/usr/bin/python3 -m gps.pa1616s --device /dev/gps0
