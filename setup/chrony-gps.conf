# kilodash GPS refclock — installed by setup/install-gps.sh to
# /etc/chrony/conf.d/kilodash-gps.conf
#
# gpsd exports serial NMEA time via SHM segment 0 (NTP0). No PPS on Prime
# (GPIO is buttoned up; PPS is a Scottina Light effort), so this source is
# tens-of-milliseconds accurate at best and can jitter with USB latency —
# which still beats unbounded drift by miles when the box is off-network.
#
# Source selection: the generous `delay` below inflates this refclock's
# root distance so any reachable NTP server (root distance typically well
# under 100 ms) wins the selection while the network exists, and chrony
# falls back to GPS automatically when disconnected. Do not add `prefer`
# or `trust` here — the fallback ordering is the point.
refclock SHM 0 refid GPS poll 2 precision 1e-1 offset 0.128 delay 0.5
